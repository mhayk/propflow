name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --no-fix

      - name: Build all apps
        run: npm run build api-gateway && npm run build work-orders-service && npm run build notifications-service && npm run build properties-service

      - name: Unit tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: propflow
          POSTGRES_PASSWORD: propflow
          POSTGRES_DB: work_orders_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-alpine
        env:
          RABBITMQ_DEFAULT_USER: propflow
          RABBITMQ_DEFAULT_PASS: propflow
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create additional test databases
        run: PGPASSWORD=propflow psql -h localhost -U propflow -d work_orders_test -c "CREATE DATABASE properties_test"

      - name: End-to-end tests
        run: npm run test:e2e
