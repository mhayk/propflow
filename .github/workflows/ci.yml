name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --no-fix

      - name: Build all apps
        run: npm run build api-gateway && npm run build work-orders-service

      - name: Unit tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: propflow
          POSTGRES_PASSWORD: propflow
          POSTGRES_DB: work_orders_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: End-to-end tests
        run: npm run test:e2e
