name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --no-fix

      - name: Validate the AsyncAPI contract
        run: npx --yes -p @asyncapi/cli@6.0.2 asyncapi validate asyncapi.yaml --fail-severity=warn

      - name: Build all apps
        run: npm run build api-gateway && npm run build work-orders-service && npm run build notifications-service && npm run build properties-service && npm run build audit-service

      - name: Unit tests (100% coverage enforced)
        run: npm run test:cov

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: propflow
          POSTGRES_PASSWORD: propflow
          POSTGRES_DB: work_orders_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-alpine
        env:
          RABBITMQ_DEFAULT_USER: propflow
          RABBITMQ_DEFAULT_PASS: propflow
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: apache/kafka:3.9.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
        ports:
          - 9092:9092
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create additional test databases
        run: |
          PGPASSWORD=propflow psql -h localhost -U propflow -d work_orders_test -c "CREATE DATABASE properties_test"
          PGPASSWORD=propflow psql -h localhost -U propflow -d work_orders_test -c "CREATE DATABASE audit_test"

      - name: End-to-end tests
        run: npm run test:e2e
