asyncapi: 3.1.0

info:
  title: PropFlow Events
  version: 1.0.0
  description: |
    The asynchronous contract of the PropFlow platform: every domain event,
    staged in a transactional outbox and relayed to RabbitMQ (transient
    fan-out) and Kafka (replayable history). Delivery is at-least-once —
    consumers dedupe on `eventId`. Narrative companion: docs/events.md;
    typed source of truth: libs/contracts.
  externalDocs:
    description: Hosted documentation
    url: https://mhayk.github.io/propflow/events/

defaultContentType: application/json

servers:
  rabbitmq:
    host: rabbitmq:5672
    protocol: amqp
    description: Work distribution — topic exchange `propflow.events`.
  kafka:
    host: kafka:9092
    protocol: kafka
    description: Audit stream — topic `propflow.work-orders`, keyed by workOrderId.

channels:
  workOrderCreated:
    address: work-order.created
    servers:
      - $ref: '#/servers/rabbitmq'
    messages:
      workOrderCreated:
        $ref: '#/components/messages/workOrderCreated'
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: propflow.events
          type: topic
          durable: true
          vhost: /
        bindingVersion: 0.3.0

  workOrderAssigned:
    address: work-order.assigned
    servers:
      - $ref: '#/servers/rabbitmq'
    messages:
      workOrderAssigned:
        $ref: '#/components/messages/workOrderAssigned'
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: propflow.events
          type: topic
          durable: true
          vhost: /
        bindingVersion: 0.3.0

  workOrderStarted:
    address: work-order.started
    servers:
      - $ref: '#/servers/rabbitmq'
    messages:
      workOrderStarted:
        $ref: '#/components/messages/workOrderStarted'
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: propflow.events
          type: topic
          durable: true
          vhost: /
        bindingVersion: 0.3.0

  workOrderCompleted:
    address: work-order.completed
    servers:
      - $ref: '#/servers/rabbitmq'
    messages:
      workOrderCompleted:
        $ref: '#/components/messages/workOrderCompleted'
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: propflow.events
          type: topic
          durable: true
          vhost: /
        bindingVersion: 0.3.0

  workOrderCancelled:
    address: work-order.cancelled
    servers:
      - $ref: '#/servers/rabbitmq'
    messages:
      workOrderCancelled:
        $ref: '#/components/messages/workOrderCancelled'
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: propflow.events
          type: topic
          durable: true
          vhost: /
        bindingVersion: 0.3.0

  workOrderTriaged:
    address: work-order.triaged
    servers:
      - $ref: '#/servers/rabbitmq'
    messages:
      workOrderTriaged:
        $ref: '#/components/messages/workOrderTriaged'
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: propflow.events
          type: topic
          durable: true
          vhost: /
        bindingVersion: 0.3.0

  auditStream:
    address: propflow.work-orders
    description: |
      Every domain event, retained as a replayable log. Messages are keyed by
      `workOrderId`, so one aggregate's events stay ordered within a
      partition; a fresh consumer group at offset 0 rebuilds any projection.
    servers:
      - $ref: '#/servers/kafka'
    messages:
      workOrderCreated:
        $ref: '#/components/messages/workOrderCreated'
      workOrderAssigned:
        $ref: '#/components/messages/workOrderAssigned'
      workOrderStarted:
        $ref: '#/components/messages/workOrderStarted'
      workOrderCompleted:
        $ref: '#/components/messages/workOrderCompleted'
      workOrderCancelled:
        $ref: '#/components/messages/workOrderCancelled'
      workOrderTriaged:
        $ref: '#/components/messages/workOrderTriaged'

operations:
  publishWorkOrderEvents:
    action: send
    channel:
      $ref: '#/channels/auditStream'
    summary: Work Orders service appends every domain event to the audit stream.
    description: |
      Events are staged in the `outbox_events` table inside the same
      transaction as the state change (ADR-0007) and published by the outbox
      relay — the service never talks to a broker on the write path. The same
      relay also publishes each event to its RabbitMQ routing key.

  onWorkOrderCreatedNotify:
    action: receive
    channel:
      $ref: '#/channels/workOrderCreated'
    summary: Notifications service alerts the property manager.
    description: |
      Queue `notifications.work-order-created`. Failures retry via the TTL
      pattern (`<queue>.retry`, 5s, max 3 attempts) before parking in
      `<queue>.dlq`. Deduped by `eventId` in the processed-events store.

  onWorkOrderCreatedTriage:
    action: receive
    channel:
      $ref: '#/channels/workOrderCreated'
    summary: Work Orders service classifies the request with an LLM.
    description: |
      Queue `work-orders.triage`. Best-effort — classification failures are
      skipped, never retried (ADR-0006). Applying a result emits
      `work-order.triaged` through the outbox. Idempotent via `triaged_at`.

  onWorkOrderCompletedNotify:
    action: receive
    channel:
      $ref: '#/channels/workOrderCompleted'
    summary: Notifications service alerts the tenant.
    description: |
      Queue `notifications.work-order-completed`, same retry/DLQ and
      dedup semantics as the created consumer.

  onAuditStream:
    action: receive
    channel:
      $ref: '#/channels/auditStream'
    summary: Audit service projects the stream into the activity feed.
    description: |
      Consumer group `audit-service`, reading from the beginning. Ingestion
      is idempotent by construction — `INSERT … ON CONFLICT (event_id) DO
      NOTHING` — so redeliveries and full replays are safe.

components:
  messages:
    workOrderCreated:
      name: workOrderCreated
      title: Work order created
      summary: A maintenance request was opened.
      payload:
        $ref: '#/components/schemas/workOrderCreatedPayload'

    workOrderAssigned:
      name: workOrderAssigned
      title: Work order assigned
      summary: A manager assigned (or reassigned) a technician.
      payload:
        $ref: '#/components/schemas/workOrderAssignedPayload'

    workOrderStarted:
      name: workOrderStarted
      title: Work order started
      summary: Status moved to in_progress.
      payload:
        $ref: '#/components/schemas/workOrderStartedPayload'

    workOrderCompleted:
      name: workOrderCompleted
      title: Work order completed
      summary: Status moved to completed.
      payload:
        $ref: '#/components/schemas/workOrderCompletedPayload'

    workOrderCancelled:
      name: workOrderCancelled
      title: Work order cancelled
      summary: Cancelled from any non-terminal state.
      payload:
        $ref: '#/components/schemas/workOrderCancelledPayload'

    workOrderTriaged:
      name: workOrderTriaged
      title: Work order triaged
      summary: The AI classification was applied (asynchronously, after created).
      payload:
        $ref: '#/components/schemas/workOrderTriagedPayload'

  schemas:
    eventEnvelope:
      type: object
      description: >
        Shared envelope of every domain event. `eventId` is the idempotency
        key consumers dedupe on.
      required: [eventId, type, occurredAt, correlationId, data]
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique per event — the consumer-side idempotency key.
        type:
          type: string
          description: Routing key of the event.
        occurredAt:
          type: string
          format: date-time
          description: Domain time — when the state changed, not delivery time.
        correlationId:
          type: [string, 'null']
          description: x-request-id of the HTTP call that caused the event.
        actorId:
          type: [string, 'null']
          description: >
            Authenticated user behind the action (JWT subject). Null means
            system-initiated (e.g. AI triage) — information, not absence.
        data:
          $ref: '#/components/schemas/workOrderData'

    workOrderData:
      type: object
      description: Full work-order snapshot at the time of the event.
      required:
        [workOrderId, propertyId, title, description, priority, status, assigneeId]
      properties:
        workOrderId:
          type: string
          format: uuid
          description: Aggregate id — also the Kafka partition key.
        propertyId:
          type: string
          format: uuid
          description: Cross-service reference (id only, never a DB foreign key).
        title:
          type: string
          maxLength: 200
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, urgent]
          description: Tenant-reported — a hint, not ground truth.
        status:
          type: string
          enum: [open, assigned, in_progress, completed, cancelled]
        assigneeId:
          type: [string, 'null']
          format: uuid
        triage:
          oneOf:
            - $ref: '#/components/schemas/workOrderTriage'
            - type: 'null'
          description: Present once the AI classification has been applied.

    workOrderTriage:
      type: object
      description: >
        AI classification with closed vocabularies — the model is constrained
        to these enums via a JSON schema, so consumers can rely on them like
        any other contract enum.
      required: [category, urgency, reasoning]
      properties:
        category:
          type: string
          enum:
            [plumbing, electrical, hvac, appliance, structural, pest_control, other]
        urgency:
          type: string
          enum: [emergency, high, medium, low]
        reasoning:
          type: string
          description: One-sentence justification, kept for auditability.

    workOrderCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/eventEnvelope'
        - type: object
          properties:
            type:
              const: work-order.created

    workOrderAssignedPayload:
      allOf:
        - $ref: '#/components/schemas/eventEnvelope'
        - type: object
          properties:
            type:
              const: work-order.assigned

    workOrderStartedPayload:
      allOf:
        - $ref: '#/components/schemas/eventEnvelope'
        - type: object
          properties:
            type:
              const: work-order.started

    workOrderCompletedPayload:
      allOf:
        - $ref: '#/components/schemas/eventEnvelope'
        - type: object
          properties:
            type:
              const: work-order.completed

    workOrderCancelledPayload:
      allOf:
        - $ref: '#/components/schemas/eventEnvelope'
        - type: object
          properties:
            type:
              const: work-order.cancelled

    workOrderTriagedPayload:
      allOf:
        - $ref: '#/components/schemas/eventEnvelope'
        - type: object
          properties:
            type:
              const: work-order.triaged
