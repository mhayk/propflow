services:
  postgres:
    image: postgres:16-alpine
    container_name: propflow-postgres
    environment:
      POSTGRES_USER: propflow
      POSTGRES_PASSWORD: propflow
      POSTGRES_DB: propflow
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U propflow']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: propflow-rabbitmq
    ports:
      - '5672:5672' # AMQP
      - '15672:15672' # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: propflow
      RABBITMQ_DEFAULT_PASS: propflow
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
