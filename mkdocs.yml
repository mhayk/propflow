site_name: PropFlow
site_description: Event-driven property maintenance platform — architecture docs
site_url: https://mhayk.github.io/propflow/
repo_url: https://github.com/mhayk/propflow
repo_name: mhayk/propflow

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Services map: services.md
  - API reference: api.md
  - OpenAPI (Scalar): https://mhayk.github.io/propflow/api-reference/
  - Event catalog: events.md
  - AsyncAPI: https://mhayk.github.io/propflow/asyncapi/
  - Sequence flows: flows.md
  - Coverage report: https://mhayk.github.io/propflow/coverage/
  - ADRs:
      - Overview: adr/README.md
      - 0001 NestJS monorepo: adr/0001-nestjs-monorepo.md
      - 0002 RabbitMQ first, Kafka later: adr/0002-rabbitmq-first-kafka-later.md
      - 0003 TypeORM over Prisma: adr/0003-typeorm-over-prisma.md
      - 0004 golevelup RabbitMQ: adr/0004-golevelup-rabbitmq-over-nest-transport.md
      - 0005 Observability stack: adr/0005-observability-stack.md
      - 0006 LLM triage: adr/0006-llm-triage.md
      - 0007 Outbox pattern: adr/0007-outbox-pattern.md
      - 0008 Authentication: adr/0008-authentication.md
      - 0009 Service discovery: adr/0009-service-discovery.md
  - Study notes:
      - Overview: notes/README.md
      - Phase 1 — Work Orders: notes/phase-1-work-orders.md
      - Phase 2 — Event-driven: notes/phase-2-event-driven.md
      - Phase 3 — Gateway: notes/phase-3-gateway-composition.md
      - Phase 4 — Observability: notes/phase-4-observability.md
      - Phase 5 — Kafka: notes/phase-5-kafka.md
      - Phase 6 — AI triage: notes/phase-6-ai-triage.md
      - Phase 7 — Hardening: notes/phase-7-hardening.md
      - Phase 8 — Auth: notes/phase-8-auth.md
