apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-orders
  labels:
    app: work-orders
spec:
  # Two replicas double as a demonstration that the outbox relay is
  # multi-instance safe: rows are claimed with FOR UPDATE SKIP LOCKED.
  replicas: 2
  selector:
    matchLabels:
      app: work-orders
  template:
    metadata:
      labels:
        app: work-orders
    spec:
      containers:
        - name: work-orders
          image: ghcr.io/mhayk/propflow-work-orders-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: WORK_ORDERS_PORT
              value: '3001'
          envFrom:
            - configMapRef:
                name: propflow-config
            - secretRef:
                name: propflow-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: work-orders
spec:
  selector:
    app: work-orders
  ports:
    - port: 3001
      targetPort: 3001
