apiVersion: v1
kind: ConfigMap
metadata:
  name: propflow-config
data:
  # Databases (host names are in-cluster Services; see k8s/README.md)
  WORK_ORDERS_DB_HOST: postgres
  WORK_ORDERS_DB_PORT: '5432'
  WORK_ORDERS_DB_USER: propflow
  WORK_ORDERS_DB_NAME: work_orders
  PROPERTIES_DB_HOST: postgres
  PROPERTIES_DB_PORT: '5432'
  PROPERTIES_DB_USER: propflow
  PROPERTIES_DB_NAME: properties
  AUDIT_DB_HOST: postgres
  AUDIT_DB_PORT: '5432'
  AUDIT_DB_USER: propflow
  AUDIT_DB_NAME: audit

  # Messaging
  KAFKA_BROKERS: kafka:9092

  # Service discovery (gateway -> downstream)
  WORK_ORDERS_URL: http://work-orders:3001
  PROPERTIES_URL: http://properties:3003
  AUDIT_URL: http://audit:3004

  # AI triage
  TRIAGE_MODEL: claude-opus-4-8

  # Outbox relay
  OUTBOX_POLL_MS: '500'
