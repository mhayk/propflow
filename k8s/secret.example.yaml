# Template only — copy to secret.yaml (gitignored) or create via kubectl:
#   kubectl create secret generic propflow-secrets \
#     --from-literal=WORK_ORDERS_DB_PASSWORD=... \
#     --from-literal=PROPERTIES_DB_PASSWORD=... \
#     --from-literal=AUDIT_DB_PASSWORD=... \
#     --from-literal=RABBITMQ_URL=amqp://user:pass@rabbitmq:5672 \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
apiVersion: v1
kind: Secret
metadata:
  name: propflow-secrets
type: Opaque
stringData:
  WORK_ORDERS_DB_PASSWORD: change-me
  PROPERTIES_DB_PASSWORD: change-me
  AUDIT_DB_PASSWORD: change-me
  # Credentials ride inside the URL, so the whole URL is a secret.
  RABBITMQ_URL: amqp://propflow:change-me@rabbitmq:5672
  # Optional — omit to run with AI triage disabled.
  ANTHROPIC_API_KEY: ''
